<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Life Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0e0f13; --surface:#16181f; --surface2:#1e2029;
    --border:rgba(255,255,255,0.07); --text:#e8eaf0; --muted:#6b7280;
    --purple:#a78bfa;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px}

  .logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:8px}
  .logo span{color:var(--purple)}
  .subtitle{text-align:center;color:var(--muted);font-size:0.82rem;margin-bottom:36px}

  label{display:block;font-size:0.75rem;color:var(--muted);margin-bottom:6px;margin-top:16px}
  input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:12px 16px;border-radius:12px;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--purple)}

  .btn{width:100%;background:linear-gradient(135deg,var(--purple),#7c3aed);color:white;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:28px;transition:opacity .2s,transform .2s;box-shadow:0 8px 24px rgba(167,139,250,.25)}
  .btn:hover{opacity:.9;transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  .error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:12px 16px;font-size:0.8rem;color:#f87171;margin-top:16px;display:none}
  .error.visible{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">life<span>.</span>dash</div>
  <div class="subtitle">Seus dados, só seus.</div>

  <label>Email</label>
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>

  <label>Senha</label>
  <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>

  <div class="error" id="erro"></div>

  <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://bszolfkwpqidoqzlzjci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_72Os9pLeArI0ll83eZLPCw_0ttl9QNc';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// se já logado, redireciona
const { data: { session } } = await supabase.auth.getSession();
if(session) window.location.href = 'index.html';

window.login = async function(){
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const btn   = document.getElementById('btnLogin');
  const erro  = document.getElementById('erro');

  if(!email || !senha){ mostrarErro('Preencha email e senha.'); return; }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  erro.classList.remove('visible');

  const { error } = await supabase.auth.signInWithPassword({ email, password: senha });

  if(error){
    mostrarErro('Email ou senha incorretos.');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  } else {
    window.location.href = 'index.html';
  }
};

function mostrarErro(msg){
  const el = document.getElementById('erro');
  el.textContent = msg;
  el.classList.add('visible');
}

// Enter para login
document.addEventListener('keydown', e => { if(e.key==='Enter') window.login(); });
</script>
</body>
</html>
