<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Treino de Força</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0e0f13;
    --surface: #16181f;
    --surface2:#1e2029;
    --border:  rgba(255,255,255,0.07);
    --text:    #e8eaf0;
    --muted:   #6b7280;
    --orange:  #fb923c;
    --green:   #34d399;
    --purple:  #a78bfa;
    --pink:    #f472b6;
    --blue:    #38bdf8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    background: rgba(14,15,19,0.95); backdrop-filter: blur(12px);
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; }
  .logo span { color: var(--orange); }
  .nav-links { display: flex; gap: 12px; }
  .nav-links a {
    font-size: 0.78rem; color: var(--muted); text-decoration: none;
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    transition: all .2s;
  }
  .nav-links a:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .nav-links a.active { color: var(--orange); border-color: var(--orange); }

  main { max-width: 680px; margin: 0 auto; padding: 40px 32px; }

  .page-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
  .page-title span { color: var(--orange); }
  .page-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }

  /* ── DATE CARD ── */
  .date-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px; margin-bottom: 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .date-card label { font-size: 0.82rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
  input[type="date"] {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem;
    padding: 8px 14px; border-radius: 10px; outline: none; flex: 1;
    transition: border-color .2s;
  }
  input[type="date"]:focus { border-color: var(--orange); }

  /* ── EXERCISE CARD ── */
  .exercise-list { display: flex; flex-direction: column; gap: 16px; }

  .exercise-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    animation: slideIn .3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

  .exercise-header {
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .exercise-num {
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    color: var(--orange); background: rgba(251,146,60,0.1);
    padding: 3px 10px; border-radius: 100px; white-space: nowrap;
  }
  .exercise-name-input {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700; outline: none;
  }
  .exercise-name-input::placeholder { color: var(--muted); font-weight: 400; }
  .btn-remove-exercise {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1.1rem; padding: 4px;
    transition: color .2s;
  }
  .btn-remove-exercise:hover { color: #f87171; }

  /* ── SETS ── */
  .sets-area { padding: 16px 20px; }

  .sets-header {
    display: grid;
    grid-template-columns: 60px 1fr 1fr 1fr 1fr 32px;
    gap: 8px;
    padding: 0 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .sets-header span {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); text-align: center;
  }
  .sets-header span:first-child { text-align: left; }

  .set-row {
    display: grid;
    grid-template-columns: 60px 1fr 1fr 1fr 1fr 32px;
    gap: 8px; align-items: center;
    margin-bottom: 8px;
    animation: slideIn .2s ease;
  }
  .set-num {
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    color: var(--orange); text-align: center;
  }
  .set-input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
    padding: 8px 10px; border-radius: 8px; outline: none; width: 100%;
    text-align: center; transition: border-color .2s;
  }
  .set-input:focus { border-color: var(--orange); }
  .set-input::placeholder { color: var(--muted); font-size: 0.7rem; }
  .btn-remove-set {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.9rem; text-align: center;
    transition: color .2s; padding: 4px;
  }
  .btn-remove-set:hover { color: #f87171; }

  .btn-add-set {
    margin-top: 10px;
    background: none; border: 1px dashed var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 8px; width: 100%; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
    transition: all .2s;
  }
  .btn-add-set:hover { border-color: var(--orange); color: var(--orange); }

  /* ── ADD EXERCISE ── */
  .btn-add-exercise {
    width: 100%;
    background: var(--surface); border: 1px dashed rgba(251,146,60,0.3);
    color: var(--orange); border-radius: 16px;
    padding: 18px; cursor: pointer; margin-top: 4px;
    font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
    transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-add-exercise:hover { background: rgba(251,146,60,0.06); border-color: var(--orange); }

  /* ── RESUMO ── */
  .resumo {
    margin-top: 28px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px;
    display: none;
  }
  .resumo.visible { display: block; }
  .resumo-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; }
  .resumo-grid { display: flex; gap: 24px; }
  .resumo-stat .label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
  .resumo-stat .val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--orange); }

  /* ── SUBMIT ── */
  .submit-wrap { display: flex; justify-content: center; margin-top: 36px; }
  .btn-submit {
    background: linear-gradient(135deg, var(--orange), #ea580c);
    color: white; border: none; border-radius: 14px;
    padding: 16px 48px; font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 8px 24px rgba(251,146,60,0.25);
    transition: opacity .2s, transform .2s;
  }
  .btn-submit:hover { opacity: .9; transform: translateY(-1px); }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #0e0f13;
    font-weight: 600; font-size: 0.85rem;
    padding: 12px 28px; border-radius: 100px;
    opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: #f87171; }
</style>
</head>
<body>

<header>
  <div class="logo">life<span>.</span>dash</div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="diario.html">Diário</a>
    <a href="treino.html" class="active">Treino</a>
    <a href="financeiro.html">Financeiro</a>
  </div>
</header>

<main>
  <div class="page-title">Treino de <span>Força</span></div>
  <p class="page-sub">Adicione cada exercício e registre cada série com seus valores reais.</p>

  <!-- DATA -->
  <div class="date-card">
    <label>📅 Data do treino</label>
    <input type="date" id="f_data"/>
  </div>

  <!-- EXERCISES -->
  <div class="exercise-list" id="exerciseList"></div>

  <button class="btn-add-exercise" onclick="addExercise()">
    + Adicionar exercício
  </button>

  <!-- RESUMO -->
  <div class="resumo" id="resumo">
    <div class="resumo-title">Resumo da sessão</div>
    <div class="resumo-grid">
      <div class="resumo-stat"><div class="label">Exercícios</div><div class="val" id="resExercicios">0</div></div>
      <div class="resumo-stat"><div class="label">Séries totais</div><div class="val" id="resSeries">0</div></div>
      <div class="resumo-stat"><div class="label">Volume total</div><div class="val" id="resVolume">0 kg</div></div>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="btn-submit" id="btnSubmit" onclick="salvar()">💪 Salvar Treino</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bszolfkwpqidoqzlzjci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_72Os9pLeArI0ll83eZLPCw_0ttl9QNc';

document.getElementById('f_data').value = new Date().toISOString().slice(0,10);

let exerciseCount = 0;

// ── ADICIONAR EXERCÍCIO ───────────────────────────────────
function addExercise(){
  exerciseCount++;
  const id  = `ex_${exerciseCount}`;
  const div = document.createElement('div');
  div.className = 'exercise-card';
  div.id = id;
  div.innerHTML = `
    <div class="exercise-header">
      <span class="exercise-num">Exercício ${exerciseCount}</span>
      <input class="exercise-name-input" placeholder="Nome do exercício..." type="text"/>
      <button class="btn-remove-exercise" onclick="removeExercise('${id}')" title="Remover exercício">✕</button>
    </div>
    <div class="sets-area">
      <div class="sets-header">
        <span>Séries</span>
        <span>Reps</span>
        <span>Duração</span>
        <span>Peso (kg)</span>
        <span>Obs.</span>
        <span></span>
      </div>
      <div class="sets-list" id="sets_${id}"></div>
      <button class="btn-add-set" onclick="addSet('${id}')">+ Adicionar série</button>
    </div>`;
  document.getElementById('exerciseList').appendChild(div);
  addSet(id);
  atualizarResumo();
}

// ── ADICIONAR SÉRIE ───────────────────────────────────────
function addSet(exId){
  const list   = document.getElementById(`sets_${exId}`);
  const setNum = list.children.length + 1;
  const row    = document.createElement('div');
  row.className = 'set-row';
  row.innerHTML = `
    <input class="set-input" type="number" min="1" value="1" title="Número de séries" style="color:var(--orange);font-weight:700"/>
    <input class="set-input" type="number" min="0" placeholder="—" title="Repetições"/>
    <input class="set-input" type="text" placeholder="ex: 1min" title="Duração"/>
    <input class="set-input" type="number" min="0" step="0.5" placeholder="—" title="Peso kg"/>
    <input class="set-input" type="text" placeholder="—" title="Observação"/>
    <button class="btn-remove-set" onclick="removeSet(this)" title="Remover série">✕</button>`;
  list.appendChild(row);
  row.querySelectorAll('input').forEach(i => i.addEventListener('input', atualizarResumo));
  atualizarResumo();
}

// ── REMOVER ───────────────────────────────────────────────
function removeExercise(id){
  document.getElementById(id)?.remove();
  atualizarResumo();
}
function removeSet(btn){
  btn.closest('.set-row').remove();
  atualizarResumo();}

// ── RESUMO ────────────────────────────────────────────────
function atualizarResumo(){
  const cards = document.querySelectorAll('.exercise-card');
  let totalSeries = 0, totalVolume = 0;
  cards.forEach(card => {
    const rows = card.querySelectorAll('.set-row');
    rows.forEach(r => {
      const series = parseFloat(r.querySelectorAll('input')[0].value) || 1;
      const reps   = parseFloat(r.querySelectorAll('input')[1].value) || 0;
      const peso   = parseFloat(r.querySelectorAll('input')[3].value) || 0;
      totalSeries += series;
      totalVolume += series * reps * peso;
    });
  });
  document.getElementById('resExercicios').textContent = cards.length;
  document.getElementById('resSeries').textContent     = totalSeries;
  document.getElementById('resVolume').textContent     = totalVolume > 0 ? `${totalVolume.toFixed(1)} kg` : '—';
  document.getElementById('resumo').classList.toggle('visible', cards.length > 0);

}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, err=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── PARSEAR DURAÇÃO ───────────────────────────────────────
function parseDuracao(str){
  if(!str || !str.trim()) return null;
  str = str.trim().toLowerCase();
  // formatos: "1min", "1m", "90s", "90", "1:30", "1m30s"
  let m = str.match(/^(\d+)m(?:in)?(?:(\d+)s?)?$/);
  if(m) return parseInt(m[1])*60 + (parseInt(m[2])||0);
  m = str.match(/^(\d+)s$/);
  if(m) return parseInt(m[1]);
  m = str.match(/^(\d+):(\d+)$/);
  if(m) return parseInt(m[1])*60 + parseInt(m[2]);
  m = str.match(/^(\d+)$/);
  if(m) return parseInt(m[1]); // assume segundos se só número
  return null;
}

// ── SALVAR ────────────────────────────────────────────────
async function salvar(){
  const btn  = document.getElementById('btnSubmit');
  const data = document.getElementById('f_data').value;
  if(!data){ showToast('Selecione a data!', true); return; }

  const cards = document.querySelectorAll('.exercise-card');
  if(!cards.length){ showToast('Adicione pelo menos um exercício!', true); return; }

  // monta payload
  const sessaoId = crypto.randomUUID();
  const rows = [];

  let valido = true;
  cards.forEach(card => {
    const nome = card.querySelector('.exercise-name-input').value.trim();
    if(!nome){ valido = false; return; }
    const sets = card.querySelectorAll('.set-row');
    sets.forEach((row, i) => {
      const inputs     = row.querySelectorAll('input');
      const num_series = inputs[0].value ? parseInt(inputs[0].value) : 1;
      const reps       = inputs[1].value ? parseInt(inputs[1].value) : null;
      const durStr     = inputs[2].value;
      const peso       = inputs[3].value ? parseFloat(inputs[3].value) : null;
      const obs        = inputs[4].value.trim() || null;
      rows.push({
        sessao_id:   sessaoId,
        data,
        exercicio:   nome,
        num_series,
        reps,
        duracao_seg: parseDuracao(durStr),
        peso_kg:     peso,
        observacao:  obs
      });
    });
  });

  if(!valido){ showToast('Preencha o nome de todos os exercícios!', true); return; }
  if(!rows.length){ showToast('Adicione pelo menos uma série!', true); return; }

  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/treino_forca`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(rows)
    });
    if(!res.ok) throw new Error(await res.text());
    showToast(`✓ ${rows.length} séries salvas!`);

    // limpa tudo
    document.getElementById('exerciseList').innerHTML = '';
    exerciseCount = 0;
    atualizarResumo();
    document.getElementById('f_data').value = new Date().toISOString().slice(0,10);

  } catch(e){
    showToast('Erro: ' + e.message, true);
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '💪 Salvar Treino';
}

// inicia com um exercício
addExercise();
</script>
</body>
</html>
